<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>{{ .Title }}</h1>

    <ul>
      {{ range .Pages }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          <small>({{ .Date.Format "2006-01-02" }})</small>
        </li>
      {{ end }}
    </ul>

    <p><a href="/">← Home</a></p>
  </div>
</body>
</html>

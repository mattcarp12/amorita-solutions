<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>{{ .Title }}</h1>

    {{ if .Date }}
      <p><small>{{ .Date.Format "January 2, 2006" }}</small></p>
    {{ end }}

    <hr/>

    {{ .Content }}

    <hr/>
    <p><a href="/">← Home</a></p>
  </div>
</body>
</html>

{{ define "main" }}
<div class="list-content">
    <h2>{{ .Title }}</h2>
    
    {{ .Content }}

    <ul class="directory-list" style="list-style-type: none; padding-left: 0; margin-top: 2rem;">
        {{ range .Pages }}
            <li style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #dcd7ce;">
                <h3 style="margin: 0 0 0.5rem 0;">
                    <a href="{{ .Permalink }}" style="text-decoration: none; color: var(--lacoste-green);">
                        {{ .Title }}
                    </a>
                </h3>
                
                {{ if not .Date.IsZero }}
                    <span style="font-size: 0.85rem; color: #666; display: block; margin-bottom: 0.5rem;">
                        {{ .Date.Format "Jan 2, 2006" }}
                    </span>
                {{ end }}

                <p style="margin: 0;">{{ .Summary }}</p>
                
                {{ if .Truncated }}
                    <a href="{{ .Permalink }}" style="font-size: 0.9rem; font-weight: bold; margin-top: 0.5rem; display: inline-block;">Read more &rarr;</a>
                {{ end }}
            </li>
        {{ end }}
    </ul>
</div>
{{ end }}

<script>
    function openLightbox(src, alt) {
        document.getElementById('lightbox-overlay').style.display = 'block';
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox-caption').innerHTML = alt;
        document.body.style.overflow = 'hidden'; // Prevents scrolling the page behind the image
    }

    function closeLightbox() {
        document.getElementById('lightbox-overlay').style.display = 'none';
        document.body.style.overflow = 'auto'; // Restores scrolling
    }
    
    // Allows users to close the lightbox by pressing the Escape key
    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            closeLightbox();
        }
    });
</script>
